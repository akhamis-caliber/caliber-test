version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: caliber_db
      POSTGRES_USER: caliber_user
      POSTGRES_PASSWORD: caliber_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - caliber-network

  # Redis for Celery
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - caliber-network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://caliber_user:caliber_password@postgres:5432/caliber_db
      - REDIS_URL=redis://redis:6379
      - FIREBASE_CREDENTIALS_PATH=/app/firebase-service-account.json
      - FIREBASE_PROJECT_ID=caliber-auth
      - JWT_SECRET_KEY=caliber-jwt-secret-key-change-this-in-production
      - SECRET_KEY=caliber-secret-key-change-this-in-production
    depends_on:
      - postgres
      - redis
    volumes:
      - ./storage:/app/storage
      - ./backend/firebase-service-account.json:/app/firebase-service-account.json
    networks:
      - caliber-network

  # Celery Worker
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A worker.celery worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://caliber_user:caliber_password@postgres:5432/caliber_db
      - REDIS_URL=redis://redis:6379
      - FIREBASE_CREDENTIALS_PATH=/app/firebase-service-account.json
      - FIREBASE_PROJECT_ID=caliber-auth
      - JWT_SECRET_KEY=caliber-jwt-secret-key-change-this-in-production
      - SECRET_KEY=caliber-secret-key-change-this-in-production
    depends_on:
      - postgres
      - redis
    volumes:
      - ./storage:/app/storage
      - ./backend/firebase-service-account.json:/app/firebase-service-account.json
    networks:
      - caliber-network

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - caliber-network

volumes:
  postgres_data:


networks:
  caliber-network:
    driver: bridge
